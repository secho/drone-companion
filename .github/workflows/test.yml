name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck all shell files
        run: |
          shopt -s globstar nullglob
          files=(install.sh uninstall.sh installer/**/*.sh scripts/*)
          if [ ${#files[@]} -gt 0 ]; then
            shellcheck "${files[@]}"
          fi

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install ui
        working-directory: ui
        run: pip install -e '.[dev]'
      - name: pytest
        working-directory: ui
        run: pytest -v

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: run bats
        run: |
          set +e
          files=(installer/lib/test_*.bats scripts/test_*.bats installer/steps/test_*.bats)
          found=()
          for f in "${files[@]}"; do [ -f "$f" ] && found+=("$f"); done
          if [ ${#found[@]} -gt 0 ]; then
            bats "${found[@]}"
          else
            echo "No bats tests yet — skipping"
          fi
